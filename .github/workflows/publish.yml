name: Publish

on:
    push:
        tags:
            - "@alexleekt/*@*"

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  registry-url: "https://registry.npmjs.org"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Extract package from tag
              id: pkg
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  # Tag format: @alexleekt/pi-bump@0.3.0
                  PKG_NAME="${TAG%@*}"
                  PKG_VERSION="${TAG##*@}"
                  PKG_DIR="${PKG_NAME#@alexleekt/}"
                  echo "name=${PKG_NAME}" >> "$GITHUB_OUTPUT"
                  echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
                  echo "dir=${PKG_DIR}" >> "$GITHUB_OUTPUT"
                  echo "Publishing ${PKG_NAME}@${PKG_VERSION} from packages/${PKG_DIR}"

            - name: Validate version match
              working-directory: packages/${{ steps.pkg.outputs.dir }}
              run: |
                  TAG_VERSION="${{ steps.pkg.outputs.version }}"
                  PKG_VERSION=$(node -p "require('./package.json').version")
                  if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
                      echo "❌ Version mismatch: tag says ${TAG_VERSION}, package.json says ${PKG_VERSION}"
                      exit 1
                  fi
                  echo "✅ Version matches: ${PKG_VERSION}"

            - name: Build (if needed)
              working-directory: packages/${{ steps.pkg.outputs.dir }}
              run: |
                  if [ -f "package.json" ] && grep -q '"build"' package.json; then
                      npm run build
                  fi

            - name: Publish to npm (Trusted Publishing / OIDC)
              if: ${{ secrets.NPM_TOKEN == '' }}
              working-directory: packages/${{ steps.pkg.outputs.dir }}
              run: |
                  echo "Using npm Trusted Publishing (OIDC provenance)..."
                  npm publish --provenance --access public

            - name: Publish to npm (NPM_TOKEN fallback)
              if: ${{ secrets.NPM_TOKEN != '' }}
              working-directory: packages/${{ steps.pkg.outputs.dir }}
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  echo "Using NPM_TOKEN for authentication..."
                  npm publish --access public
