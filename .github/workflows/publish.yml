name: Publish

on:
    push:
        tags:
            - "@alexleekt/*@*"

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  registry-url: "https://registry.npmjs.org"
                  cache: "npm"
                  token: ${{ secrets.NPM_TOKEN }}

            - name: Install dependencies
              run: npm ci

            - name: Extract package from tag
              id: pkg
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  # Tag format: @alexleekt/pi-bump@0.3.0
                  PKG_NAME="${TAG%@*}"
                  PKG_VERSION="${TAG##*@}"
                  PKG_DIR="${PKG_NAME#@alexleekt/}"
                  echo "name=${PKG_NAME}" >> "$GITHUB_OUTPUT"
                  echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
                  echo "dir=${PKG_DIR}" >> "$GITHUB_OUTPUT"
                  echo "Publishing ${PKG_NAME}@${PKG_VERSION} from packages/${PKG_DIR}"

            - name: Validate version match
              working-directory: packages/${{ steps.pkg.outputs.dir }}
              run: |
                  TAG_VERSION="${{ steps.pkg.outputs.version }}"
                  PKG_VERSION=$(node -p "require('./package.json').version")
                  if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
                      echo "❌ Version mismatch: tag says ${TAG_VERSION}, package.json says ${PKG_VERSION}"
                      exit 1
                  fi
                  echo "✅ Version matches: ${PKG_VERSION}"

            - name: Build (if needed)
              working-directory: packages/${{ steps.pkg.outputs.dir }}
              run: |
                  if [ -f "package.json" ] && grep -q '"build"' package.json; then
                      npm run build
                  fi

            - name: Check if package exists on npm
              id: exists
              run: |
                  if npm view "${{ steps.pkg.outputs.name }}" version >/dev/null 2>&1; then
                      echo "exists=true" >> "$GITHUB_OUTPUT"
                      echo "✅ Package exists on npm"
                  else
                      echo "exists=false" >> "$GITHUB_OUTPUT"
                      echo "⚠️ Package does NOT exist on npm — first publish requires manual bootstrap or NPM_TOKEN"
                  fi

            - name: Configure npm auth
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  # Write auth to the npm userconfig file that setup-node created (NPM_CONFIG_USERCONFIG)
                  # npm 11.x ignores workspace-level .npmrc, so we must ensure the userconfig has the token
                  USERCONFIG="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
                  echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> "$USERCONFIG"
                  echo "always-auth=true" >> "$USERCONFIG"
                  echo "✅ Wrote auth to npm userconfig: $USERCONFIG"
                  cat "$USERCONFIG" | sed 's/_authToken=.*/_authToken=***/g'

            - name: Publish to npm
              working-directory: packages/${{ steps.pkg.outputs.dir }}
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  PKG_EXISTS="${{ steps.exists.outputs.exists }}"
                  HAS_TOKEN="$( [ -n "$NODE_AUTH_TOKEN" ] && echo true || echo false )"

                  echo "Package exists: ${PKG_EXISTS}"
                  echo "NPM_TOKEN configured: ${HAS_TOKEN}"

                  if [ "$PKG_EXISTS" == "true" ] && [ "$HAS_TOKEN" == "false" ]; then
                      echo "→ Publishing with npm Trusted Publishing (OIDC provenance)..."
                      npm publish --provenance --access public
                  elif [ "$HAS_TOKEN" == "true" ]; then
                      if [ "$PKG_EXISTS" == "true" ]; then
                          echo "→ Publishing with NPM_TOKEN (Trusted Publishing available but token override active)..."
                      else
                          echo "→ Publishing first version with NPM_TOKEN (configure Trusted Publishing after this)..."
                      fi
                      npm publish --access public
                  else
                      echo "❌ Cannot publish: package does not exist on npm and no NPM_TOKEN is configured."
                      echo ""
                      echo "Bootstrap this package first:"
                      echo "  1. Locally: cd packages/${{ steps.pkg.outputs.dir }} && npm login && npm publish --access public"
                      echo "  2. On npmjs.com: link the package to alexleekt/pi-extensions for Trusted Publishing"
                      echo "  3. Re-tag and push to trigger this workflow again"
                      echo ""
                      echo "Or add NPM_TOKEN to repo secrets for automatic first-time publishing."
                      exit 1
                  fi
